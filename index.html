<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Talents | KV Voice Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card-bg: #161b2a; --primary: #38bdf8; --wa-green: #25D366; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 8%; background: rgba(11, 15, 26, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo img { height: 50px; width: auto; display: block; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        
        .wa-nav { background: var(--wa-green); color: #fff; padding: 10px 24px; border-radius: 12px; text-decoration: none; font-weight: 800; font-size: 0.95rem; box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4); border: 2px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .wa-nav:hover { transform: scale(1.05); box-shadow: 0 6px 25px rgba(37, 211, 102, 0.6); }

        /* Hero */
        .hero { padding: 80px 20px 60px; text-align: center; background: radial-gradient(circle at top, #1e293b 0%, #0b0f1a 70%); }
        .hero h1 { font-size: 2.8rem; margin: 0; letter-spacing: -2px; }
        .highlight { color: var(--primary); text-shadow: 0 0 30px rgba(56, 189, 248, 0.3); }
        .hero p { color: var(--text-dim); margin-top: 10px; font-size: 1rem; font-style: italic; }

        /* Main Content */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 50px; }
        .filter-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; }
        #searchInput { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 14px; color: white; width: 100%; max-width: 350px; outline: none; }
        .tabs { display: flex; background: var(--card-bg); padding: 5px; border-radius: 12px; }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-weight: 600; padding: 8px 20px; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; }

        /* Grid & Card */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .talent-image { width: 100%; height: 260px; object-fit: cover; border-radius: 15px; margin-bottom: 12px; background: #0f172a; }
        .card h3 { margin: 0; font-size: 1.2rem; font-weight: 800; }
        .tag { font-size: 0.6rem; background: rgba(56, 189, 248, 0.1); color: var(--primary); padding: 3px 10px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }

        /* Audio & Buttons */
        .samples-container { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; flex-grow: 1; }
        .sample-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; }
        .sample-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .sample-label { font-size: 8px; color: var(--primary); font-weight: 800; text-transform: uppercase; }
        .dl-link { font-size: 8px; color: var(--text-dim); text-decoration: none; font-weight: 700; }
        audio { width: 100%; height: 25px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        
        .book-btn { background: var(--wa-green); color: #fff; text-decoration: none; text-align: center; padding: 10px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; margin-top: 15px; transition: 0.3s; }
        .book-btn:hover { transform: scale(1.03); filter: brightness(1.1); }

        /* Pagination & Footer */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 40px; }
        .page-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .page-btn.active { background: var(--primary); color: #000; }
        .footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 40px 8%; background: #090d16; color: var(--text-dim); text-align: center; font-size: 0.85rem; }
        .loading { grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-dim); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><img src="logo.png" alt="KV Voice Studio"></div>
        <div class="nav-links">
            <a href="index.html" class="active">Audio Talents</a>
            <a href="video.html">Video Showcase</a>
            <a href="https://wa.me/6287823430778" class="wa-nav">Contact Us</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Talent <span class="highlight">Directory</span></h1>
        <p>"Your Trusted Partner in Audio & Voice Production"</p>
    </header>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Search talent name...">
            <div class="tabs">
                <button onclick="changeFilter('all')" class="tab-btn active" id="btn-all">All</button>
                <button onclick="changeFilter('Male')" class="tab-btn" id="btn-Male">Male</button>
                <button onclick="changeFilter('Female')" class="tab-btn" id="btn-Female">Female</button>
                <button onclick="changeFilter('Kid')" class="tab-btn" id="btn-Kid">Kid</button>
            </div>
        </div>
        <div id="talentGrid" class="grid"><div class="loading">Loading database...</div></div>
        <div id="pagination" class="pagination"></div>
    </main>

    <footer class="footer">
        <p><b>PT DKV VOICE STUDIO</b></p>
        <p>Jl. Kp. Ciwangun Indah Camp, Kab. Bandung Barat, West Java, Indonesia.</p>
        <p>&copy; 2025 KV Voice Studio. All rights reserved.</p>
    </footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";
        let allTalents = [], filteredTalents = [], currentPage = 1, itemsPerPage = 8, currentFilter = "all";

        function fixLink(url) {
            if (!url) return null;
            let link = url.trim();
            if (link.includes("dropbox.com")) return link.replace("www.dropbox.com", "dl.dropboxusercontent.com").replace(/\?dl=[01]/, "?raw=1").replace("&dl=0", "&raw=1");
            if (link.includes("drive.google.com")) {
                const match = link.match(/[?&]id=([^&]+)/) || link.match(/\/d\/(.*?)\//) || link.match(/\/file\/d\/(.*?)$/);
                if (match) return `https://docs.google.com/uc?export=view&id=${match[1].split(/[?&/]/)[0]}`;
            }
            return null;
        }

        async function loadData() {
            try {
                const res = await fetch(CSV_URL); const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                allTalents = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                    let samples = []; for (let i = 3; i <= 9; i++) { let a = fixLink(cols[i]); if (a) samples.push(a); }
                    samples = samples.slice(0, 5);
                    let photo = fixLink(cols[11]), name = cols[12] || "Unnamed", rawCat = (cols[2] || "").toLowerCase();
                    let g = "Kid"; if (rawCat.includes("female")) g = "Female"; else if (rawCat.includes("male")) g = "Male";
                    return { name, gender: g, displayGender: cols[2], samples, photo };
                }).filter(t => t.samples.length > 0);
                allTalents.sort((a, b) => a.name.localeCompare(b.name));
                applyFilterAndRender();
            } catch (e) { document.getElementById("talentGrid").innerHTML = "Error loading data."; }
        }

        function applyFilterAndRender() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            filteredTalents = allTalents.filter(t => (currentFilter === "all" || t.gender === currentFilter) && t.name.toLowerCase().includes(search));
            currentPage = 1; renderPage();
        }

        function renderPage() {
            const grid = document.getElementById("talentGrid"); grid.innerHTML = "";
            const start = (currentPage - 1) * itemsPerPage, items = filteredTalents.slice(start, start + itemsPerPage);
            if (items.length === 0) { grid.innerHTML = "<div class='loading'>No talents found.</div>"; return; }
            items.forEach(t => {
                const div = document.createElement("div"); div.className = "card";
                const waMsg = encodeURIComponent(`Hi KV Voice Studio, I want to book talent: ${t.name}.`);
                let audioHTML = t.samples.map((link, i) => `
                    <div class="sample-box">
                        <div class="sample-header"><label class="sample-label">Sample ${i+1}</label><a href="${link.replace('raw=1', 'dl=1')}" class="dl-link" target="_blank">⇓ DOWNLOAD</a></div>
                        <audio controls preload="none"><source src="${link}"></audio>
                    </div>`).join("");
                div.innerHTML = `<img src="${t.photo || 'https://via.placeholder.com/400x500/161b2a/38bdf8?text=KV+Voice'}" class="talent-image" loading="lazy">
                    <div style="display:flex; justify-content:space-between; align-items:center"><h3>${t.name}</h3><span class="tag">${t.gender}</span></div>
                    <p style="color:#94a3b8; font-size:10px; margin:2px 0 10px 0;">${t.displayGender}</p>
                    <div class="samples-container">${audioHTML}</div>
                    <a href="https://wa.me/6287823430778?text=${waMsg}" target="_blank" class="book-btn">⚡ BOOK THIS TALENT</a>`;
                grid.appendChild(div);
            });
            renderPagination();
            const players = document.querySelectorAll("audio");
            players.forEach(p => p.addEventListener("play", () => players.forEach(o => { if(o !== p) o.pause(); })));
        }

        function renderPagination() {
            const div = document.getElementById("pagination"); const total = Math.ceil(filteredTalents.length / itemsPerPage);
            div.innerHTML = ""; if (total <= 1) return;
            for (let i = 1; i <= total; i++) {
                const btn = document.createElement("button"); btn.innerText = i; btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.onclick = () => { currentPage = i; renderPage(); window.scrollTo({ top: 400, behavior: 'smooth' }); }; div.appendChild(btn);
            }
        }

        function changeFilter(g) { currentFilter = g; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-' + g).classList.add('active'); applyFilterAndRender(); }
        document.getElementById("searchInput").addEventListener("input", applyFilterAndRender);
        loadData();
    </script>
</body>
</html>
