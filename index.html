<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Directory | KV Voice Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card-bg: #161b2a; --primary: #38bdf8; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 8%; background: rgba(11, 15, 26, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo img { height: 45px; }
        .wa-nav { background: var(--primary); color: #000; padding: 8px 18px; border-radius: 10px; font-weight: 700; text-decoration: none; font-size: 0.8rem; }

        .hero { padding: 50px 20px 30px; text-align: center; background: radial-gradient(circle at top, #1e293b 0%, #0b0f1a 70%); }
        .hero h1 { font-size: 2.5rem; margin: 0; letter-spacing: -1px; }
        .highlight { color: var(--primary); }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 50px; }
        
        .filter-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
        #searchInput { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 12px; color: white; width: 100%; max-width: 300px; outline: none; }
        
        .tabs { display: flex; background: var(--card-bg); padding: 5px; border-radius: 12px; }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-weight: 600; padding: 8px 15px; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; position: relative; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        
        .talent-image { width: 100%; height: 280px; object-fit: cover; border-radius: 15px; margin-bottom: 12px; background: #0f172a; }
        .card h3 { margin: 0; font-size: 1.2rem; font-weight: 800; }
        .tag { font-size: 0.65rem; background: rgba(56, 189, 248, 0.1); color: var(--primary); padding: 3px 10px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }

        .samples-container { display: flex; flex-direction: column; gap: 6px; margin-top: 15px; }
        .sample-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; }
        .sample-label { font-size: 9px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; margin-bottom: 2px; display: block; }
        audio { width: 100%; height: 28px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        .btn-video { display: block; text-align: center; background: #ef4444; color: white; text-decoration: none; font-size: 0.75rem; font-weight: 700; padding: 8px; border-radius: 8px; margin-top: 10px; transition: 0.3s; }
        .btn-video:hover { background: #dc2626; }

        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
        .page-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .page-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        footer { text-align: center; padding: 40px 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 50px; color: var(--text-dim); font-size: 0.9rem; }
        .loading { grid-column: 1/-1; text-align: center; padding: 100px; color: var(--primary); font-weight: bold; }

        @media (max-width: 600px) {
            .navbar { padding: 10px 5%; }
            .hero h1 { font-size: 1.8rem; }
            .filter-bar { justify-content: center; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><strong>KV VOICE STUDIO</strong></div>
        <div class="nav-links">
            <a href="https://wa.me/6287823430778" class="wa-nav">Contact Us</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Audio Talent <span class="highlight">Catalog</span></h1>
        <p>Professional Voice Solution Partner</p>
    </header>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Cari nama talent...">
            <div class="tabs">
                <button onclick="changeFilter('all')" class="tab-btn active" id="btn-all">All</button>
                <button onclick="changeFilter('Male')" class="tab-btn" id="btn-Male">Male</button>
                <button onclick="changeFilter('Female')" class="tab-btn" id="btn-Female">Female</button>
                <button onclick="changeFilter('Kid')" class="tab-btn" id="btn-Kid">Kid</button>
            </div>
        </div>

        <div id="talentGrid" class="grid"><div class="loading">Sinkronisasi Database...</div></div>
        <div id="pagination" class="pagination"></div>
    </main>

    <footer>
        <p>Setiap project didukung oleh tim Lokalisasi, Subtitling, dan Transkreasi kami.</p>
        <p style="margin-top: 10px; font-size: 0.7rem;">&copy; 2024 KV Voice Studio</p>
    </footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";
        
        let allTalents = [];
        let filteredTalents = [];
        let currentPage = 1;
        const itemsPerPage = 8;
        let currentFilter = "all";

        function fixLink(url) {
            if (!url || url.trim() === "" || url.trim() === "-") return null;
            let link = url.trim();
            if (link.includes("drive.google.com")) {
                const match = link.match(/[?&]id=([^&]+)/) || link.match(/\/d\/(.*?)\//) || link.match(/\/file\/d\/(.*?)$/);
                if (match) return `https://docs.google.com/uc?export=view&id=${match[1].split(/[?&/]/)[0]}`;
            }
            return link;
        }

        async function loadData() {
            try {
                // Tambahkan Timestamp (?t=) agar selalu ambil data terbaru dari server Google
                const res = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
                const text = await res.text();
                
                // Parsing CSV baris demi baris
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                
                allTalents = rows.slice(1).map(row => {
                    // Split kolom dengan cerdas (menghindari error jika ada koma dalam teks)
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                    
                    // Mapping Kolom:
                    // M (Nama): index 12 -> Ambil nama depan saja
                    let fullName = cols[12] || "Talent";
                    let firstName = fullName.split(' ')[0];
                    
                    // C (Kategori): index 2
                    let category = cols[2] || "Other";
                    
                    // D-J (Samples Audio): index 3 sampai 9
                    let samples = [];
                    for (let i = 3; i <= 9; i++) {
                        let s = fixLink(cols[i]);
                        if (s) samples.push(s);
                    }
                    
                    // L (Foto): index 11
                    let photo = fixLink(cols[11]);
                    
                    // N (Video): index 13
                    let video = cols[13] || null;

                    return { name: firstName, category, samples, photo, video };
                }).filter(t => t.name !== "Talent");

                applyFilterAndRender();
            } catch (e) { 
                document.getElementById("talentGrid").innerHTML = "Gagal memuat database."; 
            }
        }

        function applyFilterAndRender() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            filteredTalents = allTalents.filter(t => {
                const matchFilter = currentFilter === "all" || t.category.toLowerCase().includes(currentFilter.toLowerCase());
                const matchSearch = t.name.toLowerCase().includes(search);
                return matchFilter && matchSearch;
            });
            currentPage = 1;
            renderPage();
        }

        function renderPage() {
            const grid = document.getElementById("talentGrid");
            grid.innerHTML = "";
            
            const start = (currentPage - 1) * itemsPerPage;
            const items = filteredTalents.slice(start, start + itemsPerPage);

            if (items.length === 0) {
                grid.innerHTML = "<div class='loading'>Tidak ada talent ditemukan.</div>";
                return;
            }

            items.forEach(t => {
                const div = document.createElement("div");
                div.className = "card";
                
                let audioHTML = t.samples.map((link, i) => `
                    <div class="sample-box">
                        <label class="sample-label">Sample ${i+1}</label>
                        <audio controls preload="none"><source src="${link}"></audio>
                    </div>
                `).join("");

                let videoBtn = t.video ? `<a href="${t.video}" target="_blank" class="btn-video">Watch Video Demo</a>` : "";

                div.innerHTML = `
                    <img src="${t.photo || 'https://via.placeholder.com/300x400/161b2a/38bdf8?text=No+Photo'}" class="talent-image" alt="KV">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <h3>${t.name}</h3>
                        <span class="tag">${t.category}</span>
                    </div>
                    <div class="samples-container">${audioHTML}</div>
                    ${videoBtn}
                `;
                grid.appendChild(div);
            });

            renderPagination();
            
            // Auto-pause audio lain saat satu audio di-play
            const players = document.querySelectorAll("audio");
            players.forEach(p => p.addEventListener("play", () => {
                players.forEach(other => { if(other !== p) other.pause(); });
            }));
        }

        function renderPagination() {
            const container = document.getElementById("pagination");
            const totalPages = Math.ceil(filteredTalents.length / itemsPerPage);
            container.innerHTML = "";
            if (totalPages <= 1) return;

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement("button");
                btn.innerText = i;
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.onclick = () => { currentPage = i; renderPage(); window.scrollTo({top: 400, behavior: 'smooth'}); };
                container.appendChild(btn);
            }
        }

        function changeFilter(cat) {
            currentFilter = cat;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + cat).classList.add('active');
            applyFilterAndRender();
        }

        document.getElementById("searchInput").addEventListener("input", applyFilterAndRender);
        loadData();
    </script>
</body>
</html>
