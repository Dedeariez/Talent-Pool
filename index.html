<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Native Indonesian Voice Over & Dubbing Studio | KV Voice Studio</title>
    <meta name="description" content="Professional Indonesian voice-over & dubbing services. Featuring Male, Female, and genuine Kid voices.">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #f8fafc; 
            --card-bg: #ffffff; 
            --primary: #0ea5e9; 
            --primary-glow: rgba(14, 165, 233, 0.15);
            --wa-green: #22c55e; 
            --text: #0f172a; 
            --text-dim: #64748b; 
            --border: #e2e8f0; 
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 5%; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .logo img { height: 45px; width: auto; display: block; }
        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-weight: 600; font-size: 0.9rem; }
        .nav-links a.active { color: var(--primary); }
        .wa-nav { background: var(--wa-green) !important; color: #ffffff !important; padding: 10px 20px; border-radius: 12px; text-decoration: none !important; font-weight: 800; font-size: 0.85rem; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2); }

        .hero { padding: 60px 20px; text-align: center; background: linear-gradient(135deg, #e0f2fe 0%, #f8fafc 100%); }
        .hero h1 { font-size: 2.2rem; margin: 0; letter-spacing: -1px; color: #0f172a; }
        .highlight { color: var(--primary); }
        .hero p { color: var(--text-dim); margin-top: 10px; font-size: 1rem; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px 15px 80px; }
        .filter-bar { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        #searchInput { background: #ffffff; border: 1px solid var(--border); padding: 12px 15px; border-radius: 12px; width: 100%; box-sizing: border-box; outline: none; font-size: 1rem; }
        
        .tabs { display: flex; background: #f1f5f9; padding: 4px; border-radius: 14px; gap: 4px; border: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        .tab-btn { flex: 1; background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-weight: 700; padding: 12px 15px; border-radius: 10px; font-size: 0.85rem; white-space: nowrap; min-width: 80px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary) !important; color: #ffffff !important; box-shadow: 0 4px 12px var(--primary-glow); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 15px; border: 1px solid var(--border); transition: 0.3s; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 12px 25px rgba(0,0,0,0.06); }
        .talent-image { width: 100%; height: 260px; object-fit: cover; border-radius: 15px; margin-bottom: 12px; background: #f1f5f9; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .card h3 { margin: 0; font-size: 1.1rem; font-weight: 800; color: #0f172a; }
        .tag { font-size: 0.6rem; background: #f0f9ff; color: var(--primary); padding: 3px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; border: 1px solid #e0f2fe; }

        .samples-container { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; flex-grow: 1; }
        .sample-box { background: #f8fafc; padding: 8px; border-radius: 10px; border: 1px solid var(--border); }
        .sample-label { font-size: 8px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: block; }
        audio { width: 100%; height: 30px; }
        
        .book-btn { background: var(--wa-green); color: #fff; text-decoration: none; text-align: center; padding: 12px; border-radius: 12px; font-weight: 800; font-size: 0.8rem; margin-top: 15px; }

        .pagination { display: flex; justify-content: center; gap: 5px; margin-top: 40px; }
        .page-btn { background: #ffffff; border: 1px solid var(--border); padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .page-btn.active { background: var(--primary); color: #ffffff; }

        .footer { border-top: 1px solid var(--border); padding: 40px 20px; background: #ffffff; text-align: center; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; max-width: 900px; margin: 30px auto; }
        .team-photo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 3px solid #f1f5f9; }
        
        .loading { grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-dim); font-weight: 600; }
        .error-msg { color: #ef4444; background: #fef2f2; padding: 20px; border-radius: 10px; border: 1px solid #fee2e2; }

        @media (min-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .filter-bar { flex-direction: row; justify-content: space-between; }
            #searchInput { max-width: 400px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><img src="logo.png" alt="KV Voice Studio"></div>
        <div class="nav-links">
            <a href="index.html" class="active">Audio</a>
            <a href="video.html">Video</a>
            <a href="https://wa.me/6287823430778" class="wa-nav">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Native Indonesian <span class="highlight">Voice Over</span></h1>
        <p>"Your Trusted Partner in Audio & Voice Production"</p>
    </header>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Search talent name...">
            <div class="tabs">
                <button onclick="changeFilter('all')" class="tab-btn active" id="btn-all">All</button>
                <button onclick="changeFilter('Male')" class="tab-btn" id="btn-Male">Male</button>
                <button onclick="changeFilter('Female')" class="tab-btn" id="btn-Female">Female</button>
                <button onclick="changeFilter('Kid')" class="tab-btn" id="btn-Kid">Kid</button>
            </div>
        </div>
        <div id="talentGrid" class="grid"><div class="loading">Initializing database...</div></div>
        <div id="pagination" class="pagination"></div>
    </main>

    <footer class="footer">
        <h3>Meet Our Team</h3>
        <div class="team-grid">
            <div class="team-member">
                <img src="https://www.dropbox.com/scl/fi/u61rmkyd5yg4ghmqynmoq/IMG_20191019_141957.jpg?rlkey=8hs1djk1c4ejuyghws0hno4j5&raw=1" class="team-photo" onerror="handleImageError(this, 'DA')">
                <div style="font-weight:800; font-size:0.9rem">Dede Ariez</div><div style="font-size:0.7rem; color:gray">Founder</div>
            </div>
            <div class="team-member">
                <img src="https://www.dropbox.com/scl/fi/195c9i3c7kcwx8tohbk7z/Gemini_Generated_Image_tade4mtade4mtade.png?rlkey=ju6iclnjn7b840g757zxzqwzf&raw=1" class="team-photo" onerror="handleImageError(this, 'RR')">
                <div style="font-weight:800; font-size:0.9rem">Rosa Rosana</div><div style="font-size:0.7rem; color:gray">Manager</div>
            </div>
            <div class="team-member">
                <img src="https://www.dropbox.com/scl/fi/195c9i3c7kcwx8tohbk7z/Gemini_Generated_Image_tade4mtade4mtade.png?rlkey=ju6iclnjn7b840g757zxzqwzf&raw=1" class="team-photo" onerror="handleImageError(this, 'RK')">
                <div style="font-weight:800; font-size:0.9rem">Ryan Kurnia</div><div style="font-size:0.7rem; color:gray">Editor</div>
            </div>
            <div class="team-member">
                <img src="https://www.dropbox.com/scl/fi/195c9i3c7kcwx8tohbk7z/Gemini_Generated_Image_tade4mtade4mtade.png?rlkey=ju6iclnjn7b840g757zxzqwzf&raw=1" class="team-photo" onerror="handleImageError(this, 'AN')">
                <div style="font-weight:800; font-size:0.9rem">Annida</div><div style="font-size:0.7rem; color:gray">Localization</div>
            </div>
        </div>
        <div style="font-size: 0.8rem; color: gray; margin-top: 20px;">
            <p><b>KV VOICE STUDIO</b></p>
            <p>Jl. Kp. Ciwangun Indah Camp, Bandung Barat, Indonesia.</p>
        </div>
    </footer>

    <script>
        // Link CSV Akang
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";
        
        let allTalents = [], filteredTalents = [], currentPage = 1, itemsPerPage = 8, currentFilter = "all";

        function handleImageError(img, initials) {
            img.onerror = null;
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="#e2e8f0"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#0ea5e9" font-family="sans-serif" font-size="30" font-weight="bold">${initials}</text></svg>`;
            img.src = 'data:image/svg+xml;base64,' + btoa(svg);
        }

        function fixLink(url) {
            if (!url || url.trim().length < 5) return null;
            let link = url.trim();
            if (link.includes("dropbox.com")) return link.replace("www.dropbox.com", "dl.dropboxusercontent.com").replace(/\?dl=[01]/, "?raw=1").replace("&dl=0", "&raw=1");
            if (link.includes("drive.google.com")) {
                const match = link.match(/[?&]id=([^&]+)/) || link.match(/\/d\/(.*?)\//);
                if (match) return `https://docs.google.com/uc?export=view&id=${match[1].split(/[?&/]/)[0]}`;
            }
            return link;
        }

        async function loadData() {
            const grid = document.getElementById("talentGrid");
            try {
                const res = await fetch(CSV_URL);
                if (!res.ok) throw new Error("Could not fetch CSV. Check 'Publish to Web' settings.");
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                
                if (rows.length < 2) throw new Error("Spreadsheet seems to be empty.");

                const seenNames = new Set();
                const cleanData = [];

                rows.slice(1).forEach((row, index) => {
                    // Split CSV accurately
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, "").trim());
                    
                    // MAPPING: C=2, D=3, L=11, M=12
                    let rawName = cols[12] || cols[2] || "Unknown";
                    let dedupeKey = rawName.toLowerCase();

                    if (!seenNames.has(dedupeKey)) {
                        let samples = []; 
                        // D-J are index 3 to 9
                        for (let i = 3; i <= 9; i++) { 
                            let a = fixLink(cols[i]); 
                            if (a) samples.push(a); 
                        }
                        
                        // Limit to 5 samples
                        samples = samples.slice(0, 5);

                        if (samples.length > 0) {
                            seenNames.add(dedupeKey);
                            let photo = fixLink(cols[11]);
                            let rawCat = (cols[2] || "").toLowerCase();
                            
                            let g = "Kid";
                            if (rawCat.includes("female") || rawCat.includes("wanita") || rawCat.includes("perempuan")) g = "Female";
                            else if (rawCat.includes("male") || rawCat.includes("pria") || rawCat.includes("laki")) g = "Male";
                            
                            cleanData.push({ name: rawName, gender: g, displayGender: cols[2], samples, photo });
                        }
                    }
                });

                allTalents = cleanData.sort((a, b) => a.name.localeCompare(b.name));
                applyFilterAndRender();
            } catch (e) { 
                grid.innerHTML = `<div class="loading error-msg"><b>Database Error:</b><br>${e.message}</div>`; 
            }
        }

        function applyFilterAndRender() { 
            filteredTalents = allTalents.filter(t => (currentFilter === "all" || t.gender === currentFilter) && t.name.toLowerCase().includes(document.getElementById("searchInput").value.toLowerCase())); 
            currentPage = 1; 
            renderPage(); 
        }
        
        function renderPage() {
            const grid = document.getElementById("talentGrid"); grid.innerHTML = "";
            const start = (currentPage - 1) * itemsPerPage, items = filteredTalents.slice(start, start + itemsPerPage);
            
            if (items.length === 0) { 
                grid.innerHTML = "<div class='loading'>No talents matching your criteria.</div>"; 
                document.getElementById("pagination").innerHTML = "";
                return; 
            }

            items.forEach(t => {
                const div = document.createElement("div"); div.className = "card";
                const waMsg = encodeURIComponent(`Hi KV Voice Studio, I want to book talent: ${t.name}.`);
                let audioHTML = t.samples.map((link, i) => `<div class="sample-box"><label class="sample-label">Sample ${i+1}</label><audio controls preload="none"><source src="${link}"></audio></div>`).join("");
                const initials = t.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                
                div.innerHTML = `
                    <img src="${t.photo || ''}" class="talent-image" onerror="handleImageError(this, '${initials}')" loading="lazy">
                    <div class="card-header"><h3>${t.name}</h3><span class="tag">${t.gender}</span></div>
                    <p style="color:var(--text-dim); font-size:10px; margin:0;">${t.displayGender}</p>
                    <div class="samples-container">${audioHTML}</div>
                    <a href="https://wa.me/6287823430778?text=${waMsg}" target="_blank" class="book-btn">⚡ BOOK TALENT</a>`;
                grid.appendChild(div);
            });
            renderPagination();
        }

        function renderPagination() {
            const div = document.getElementById("pagination"); const total = Math.ceil(filteredTalents.length / itemsPerPage); div.innerHTML = ""; if (total <= 1) return;
            for (let i = 1; i <= total; i++) {
                const btn = document.createElement("button"); btn.innerText = i; btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.onclick = () => { currentPage = i; renderPage(); window.scrollTo({ top: 300, behavior: 'smooth' }); }; div.appendChild(btn);
            }
        }

        function changeFilter(g) {
            currentFilter = g;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-' + g));
            applyFilterAndRender();
        }

        document.getElementById("searchInput").addEventListener("input", applyFilterAndRender);
        window.onload = loadData;
    </script>
</body>
</html>
