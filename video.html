<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Showcase | KV Voice Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card-bg: #161b2a; --primary: #f43f5e; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; background: rgba(11, 15, 26, 0.95); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 800; color: #fff; }
        .nav-links a { text-decoration: none; color: var(--text-dim); margin-left: 20px; font-weight: 600; font-size: 0.9rem; }
        .nav-links a.active { color: var(--primary); }

        .hero { padding: 50px 20px; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 50px; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .video-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .video-thumbnail { width: 100%; height: 200px; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .play-overlay { position: absolute; font-size: 3rem; color: var(--primary); opacity: 0.8; }
        
        .video-info { padding: 20px; }
        .btn-watch { display: block; width: 100%; text-align: center; background: var(--primary); color: white; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: 700; margin-top: 15px; }
        
        footer { text-align: center; padding: 40px; color: var(--text-dim); font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">KV VOICE STUDIO</div>
        <div class="nav-links">
            <a href="index.html">Audio Catalog</a>
            <a href="video.html" class="active">Video Showcase</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Video <span style="color:var(--primary)">Showcase</span></h1>
    </header>

    <main class="container">
        <div id="videoGrid" class="video-grid">
            <p style="text-align:center; grid-column: 1/-1;">Memuat video...</p>
        </div>
    </main>

    <footer>
        Setiap project didukung oleh tim Lokalisasi, Subtitling, dan Transkreasi kami.
    </footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";

        async function loadVideos() {
            const res = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
            const text = await res.text();
            const rows = text.split(/\r?\n/).slice(1);
            
            const videoData = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                return {
                    name: cols[12],
                    category: cols[2],
                    videoLink: cols[13] // Kolom N
                };
            }).filter(t => t.videoLink && t.videoLink !== "-");

            const grid = document.getElementById("videoGrid");
            grid.innerHTML = videoData.map(v => `
                <div class="video-card">
                    <div class="video-thumbnail">
                        <div class="play-overlay">▶</div>
                    </div>
                    <div class="video-info">
                        <h3 style="margin:0">${v.name}</h3>
                        <p style="color:var(--text-dim); font-size:0.8rem">${v.category}</p>
                        <a href="${v.videoLink}" target="_blank" class="btn-watch">Tonton Video Demo</a>
                    </div>
                </div>
            `).join('');
        }
        loadVideos();
    </script>
</body>
</html>
