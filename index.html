<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Talent | KV Voice Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card-bg: #161b2a; --primary: #38bdf8; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 8%; background: rgba(11, 15, 26, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo img { height: 50px; width: auto; display: block; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .wa-nav { background: var(--primary); color: #000; padding: 8px 18px; border-radius: 10px; font-weight: 700; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }

        /* Hero */
        .hero { padding: 60px 20px 40px; text-align: center; background: radial-gradient(circle at top, #1e293b 0%, #0b0f1a 70%); }
        .hero h1 { font-size: 2.5rem; margin: 0; letter-spacing: -2px; }
        .highlight { color: var(--primary); text-shadow: 0 0 30px rgba(56, 189, 248, 0.3); }

        /* Main */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 50px; }
        .filter-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; }
        #searchInput { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 14px; color: white; width: 100%; max-width: 350px; outline: none; }
        .tabs { display: flex; background: var(--card-bg); padding: 5px; border-radius: 12px; }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-weight: 600; padding: 8px 20px; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; }

        /* Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; min-height: 400px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .talent-image { width: 100%; height: 260px; object-fit: cover; border-radius: 15px; margin-bottom: 12px; background: #0f172a; }
        .card h3 { margin: 0; font-size: 1.1rem; font-weight: 800; color: #fff; }
        .tag { font-size: 0.6rem; background: rgba(56, 189, 248, 0.1); color: var(--primary); padding: 3px 10px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }

        /* Audio Player */
        .samples-container { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .sample-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; }
        .sample-label { font-size: 8px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 3px; display: block; }
        audio { width: 100%; height: 25px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 40px; padding-bottom: 40px; }
        .page-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .page-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }
        .page-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
        
        .loading { grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-dim); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><img src="logo.png" alt="KV Voice Logo"></div>
        <div class="nav-links">
            <a href="index.html" class="active">Audio Talent</a>
            <a href="video.html">Video Showcase</a>
            <a href="https://wa.me/6287823430778" class="wa-nav">Contact Us</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Talent <span class="highlight">Directory</span></h1>
        <p>Your Comprehensive Voice Solution Partner</p>
    </header>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Cari nama talent...">
            <div class="tabs">
                <button onclick="changeFilter('all')" class="tab-btn active" id="btn-all">All Talent</button>
                <button onclick="changeFilter('Male')" class="tab-btn" id="btn-Male">Male</button>
                <button onclick="changeFilter('Female')" class="tab-btn" id="btn-Female">Female</button>
            </div>
        </div>

        <div id="talentGrid" class="grid"><div class="loading">Memuat database talent...</div></div>
        <div id="pagination" class="pagination"></div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";
        
        let allTalents = [];
        let filteredTalents = [];
        let currentPage = 1;
        const itemsPerPage = 8; // DIUBAH KE 8 TALENT PER HALAMAN
        let currentFilter = "all";

        function fixLink(url) {
            if (!url || url.trim() === "" || url.trim() === "-") return null;
            let link = url.trim();
            if (link.includes("dropbox.com")) return link.replace("www.dropbox.com", "dl.dropboxusercontent.com").replace(/\?dl=[01]/, "?raw=1").replace("&dl=0", "&raw=1") + (link.includes("?") ? "" : "?raw=1");
            if (link.includes("drive.google.com")) {
                const match = link.match(/[?&]id=([^&]+)/) || link.match(/\/d\/(.*?)\//) || link.match(/\/file\/d\/(.*?)$/);
                if (match) return `https://docs.google.com/uc?export=view&id=${match[1].split(/[?&/]/)[0]}`;
            }
            return link;
        }

        async function loadData() {
            try {
                // PERBAIKAN DI SINI: Menambahkan Cache Buster dinamis menggunakan timestamp waktu saat ini
                const freshUrl = `${CSV_URL}&t=${new Date().getTime()}`;
                const res = await fetch(freshUrl);
                
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                
                allTalents = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                    let samples = [];
                    for (let i = 4; i <= 10; i++) { 
                        let a = fixLink(cols[i]); 
                        if (a) samples.push(a); 
                    }
                    let photo = fixLink(cols[12]); 
                    let name = cols[13] || cols[2] || "Unnamed";
                    let rawCat = (cols[3] || "").toLowerCase();
                    let g = rawCat.includes("female") ? "Female" : (rawCat.includes("male") ? "Male" : "Other");

                    return { name, gender: g, displayGender: cols[3], samples, photo };
                }).filter(t => t.samples.length > 0);

                allTalents.sort((a, b) => a.name.localeCompare(b.name));
                applyFilterAndRender();
            } catch (e) { document.getElementById("talentGrid").innerHTML = "Error loading data."; }
        }

        function applyFilterAndRender() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            filteredTalents = allTalents.filter(t => 
                (currentFilter === "all" || t.gender === currentFilter) &&
                (t.name.toLowerCase().includes(search))
            );
            currentPage = 1;
            renderPage();
        }

        function renderPage() {
            const grid = document.getElementById("talentGrid");
            const paginationDiv = document.getElementById("pagination");
            grid.innerHTML = "";

            const start = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filteredTalents.slice(start, start + itemsPerPage);

            if (paginatedItems.length === 0) {
                grid.innerHTML = "<div class='loading'>Talent tidak ditemukan.</div>";
                paginationDiv.innerHTML = "";
                return;
            }

            paginatedItems.forEach(t => {
                const div = document.createElement("div");
                div.className = "card";
                let audioHTML = t.samples.map((link, i) => `
                    <div class="sample-box">
                        <label class="sample-label">Sample ${i+1}</label>
                        <audio controls preload="none"><source src="${link}"></audio>
                    </div>
                `).join("");
                const imageSrc = t.photo || "https://via.placeholder.com/400x500/161b2a/38bdf8?text=KV+Voice";
                div.innerHTML = `
                    <img src="${imageSrc}" class="talent-image" alt="${t.name}">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <h3>${t.name}</h3>
                        <span class="tag">${t.gender}</span>
                    </div>
                    <p style="color:#94a3b8; font-size:10px; margin:2px 0 10px 0;">${t.displayGender}</p>
                    <div class="samples-container">${audioHTML}</div>
                `;
                grid.appendChild(div);
            });

            renderPaginationControls();
            
            const players = document.querySelectorAll("audio");
            players.forEach(p => p.addEventListener("play", () => {
                players.forEach(other => { if(other !== p) other.pause(); });
            }));
        }

        function renderPaginationControls() {
            const paginationDiv = document.getElementById("pagination");
            const totalPages = Math.ceil(filteredTalents.length / itemsPerPage);
            paginationDiv.innerHTML = "";
            if (totalPages <= 1) return;

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement("button");
                btn.innerText = i;
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.onclick = () => { 
                    currentPage = i; 
                    renderPage(); 
                    window.scrollTo({ top: 400, behavior: 'smooth' }); 
                };
                paginationDiv.appendChild(btn);
            }
        }

        function changeFilter(g) {
            currentFilter = g;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + g).classList.add('active');
            applyFilterAndRender();
        }

        document.getElementById("searchInput").addEventListener("input", applyFilterAndRender);
        loadData();
    </script>
</body>
</html>
