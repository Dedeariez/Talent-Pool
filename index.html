<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Talent | KV Voice Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card-bg: #161b2a; --primary: #38bdf8; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; background: rgba(11, 15, 26, 0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 800; font-size: 1.2rem; color: #fff; letter-spacing: -1px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .wa-btn { background: var(--primary); color: #000 !important; padding: 8px 15px; border-radius: 8px; }

        .hero { padding: 60px 20px 40px; text-align: center; }
        .hero h1 { font-size: 2.5rem; margin: 0; }
        .highlight { color: var(--primary); }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 50px; }
        .filter-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
        #searchInput { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 12px; color: white; width: 300px; outline: none; }
        
        .tabs { display: flex; background: var(--card-bg); padding: 5px; border-radius: 12px; }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-weight: 600; padding: 8px 20px; border-radius: 8px; }
        .tab-btn.active { background: var(--primary); color: #000; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .talent-img { width: 100%; height: 280px; object-fit: cover; border-radius: 15px; margin-bottom: 12px; background: #0f172a; }
        
        .samples { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .sample-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; }
        .sample-label { font-size: 9px; color: var(--primary); font-weight: 700; text-transform: uppercase; display: block; }
        audio { width: 100%; height: 28px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
        .page-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .page-btn.active { background: var(--primary); color: #000; }

        footer { text-align: center; padding: 40px; border-top: 1px solid rgba(255,255,255,0.05); color: var(--text-dim); font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">KV VOICE STUDIO</div>
        <div class="nav-links">
            <a href="index.html" class="active">Audio Catalog</a>
            <a href="video.html">Video Showcase</a>
            <a href="https://wa.me/6287823430778" class="wa-btn">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Audio <span class="highlight">Talent</span></h1>
    </header>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Cari nama talent...">
            <div class="tabs">
                <button onclick="changeFilter('all')" class="tab-btn active" id="btn-all">All</button>
                <button onclick="changeFilter('Male')" class="tab-btn" id="btn-Male">Male</button>
                <button onclick="changeFilter('Female')" class="tab-btn" id="btn-Female">Female</button>
                <button onclick="changeFilter('Kid')" class="tab-btn" id="btn-Kid">Kid</button>
            </div>
        </div>
        <div id="talentGrid" class="grid"></div>
        <div id="pagination" class="pagination"></div>
    </main>

    <footer>
        Setiap project didukung oleh tim Lokalisasi, Subtitling, dan Transkreasi kami.
    </footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";
        let allData = [];
        let currentFilter = 'all';

        function fixLink(url) {
            if (!url || url === "-") return null;
            const match = url.match(/\/d\/(.*?)\//) || url.match(/id=(.*?)$/);
            return match ? `https://docs.google.com/uc?export=view&id=${match[1]}` : url;
        }

        async function init() {
            const res = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
            const text = await res.text();
            const rows = text.split(/\r?\n/).slice(1);
            
            allData = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                let samples = [];
                for(let i=3; i<=9; i++) if(fixLink(cols[i])) samples.push(fixLink(cols[i]));
                return {
                    name: (cols[12] || "Talent").split(' ')[0],
                    category: cols[2] || "",
                    photo: fixLink(cols[11]),
                    samples: samples
                };
            }).filter(t => t.name !== "Talent");
            render();
        }

        function render() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            const filtered = allData.filter(t => 
                (currentFilter === 'all' || t.category.toLowerCase().includes(currentFilter.toLowerCase())) &&
                (t.name.toLowerCase().includes(search))
            );

            const grid = document.getElementById("talentGrid");
            grid.innerHTML = filtered.map(t => `
                <div class="card">
                    <img src="${t.photo || 'https://via.placeholder.com/300x400'}" class="talent-img">
                    <div style="display:flex; justify-content:space-between">
                        <h3>${t.name}</h3>
                        <span style="font-size:10px; color:var(--primary)">${t.category}</span>
                    </div>
                    <div class="samples">
                        ${t.samples.map((s, i) => `
                            <div class="sample-box">
                                <label class="sample-label">Sample ${i+1}</label>
                                <audio controls preload="none"><source src="${s}"></audio>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function changeFilter(c) {
            currentFilter = c;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+c));
            render();
        }

        document.getElementById("searchInput").addEventListener("input", render);
        init();
    </script>
</body>
</html>
