<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Portfolio | KV Voice Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card-bg: #161b2a; --primary: #38bdf8; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 8%; background: rgba(11, 15, 26, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo img { height: 50px; width: auto; display: block; }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .wa-nav { background: var(--primary); color: #000; padding: 8px 18px; border-radius: 10px; font-weight: 700; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }

        /* Hero Section */
        .hero { padding: 60px 20px 40px; text-align: center; background: radial-gradient(circle at top, #1e293b 0%, #0b0f1a 70%); }
        .hero h1 { font-size: 2.8rem; margin: 0; letter-spacing: -2px; }
        .highlight { color: var(--primary); text-shadow: 0 0 30px rgba(56, 189, 248, 0.3); }
        .hero p { color: var(--text-dim); margin-top: 10px; font-size: 1rem; }

        /* Grid Layout */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 100px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 40px; }
        @media (max-width: 600px) { .video-grid { grid-template-columns: 1fr; } }

        /* Video Card Styling */
        .video-card { background: var(--card-bg); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; }
        .video-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        
        .video-wrapper { width: 100%; border-radius: 16px; overflow: hidden; background: #000; position: relative; padding-top: 56.25%; margin-bottom: 15px; }
        .video-wrapper iframe, .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .card-info h3 { margin: 0; font-size: 1.4rem; color: #fff; line-height: 1.3; text-align: left; }
        
        .loading { grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-dim); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><img src="logo.png" alt="KV Voice Logo"></div>
        <div class="nav-links">
            <a href="index.html">Audio Talent</a>
            <a href="video.html" class="active">Video Showcase</a>
            <a href="https://wa.me/6287823430778" class="wa-nav">Hubungi Kami</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Video <span class="highlight">Portfolio</span></h1>
        <p>Featured Voice Over Projects & Portfolio</p>
    </header>

    <main class="container">
        <div id="videoGrid" class="video-grid"><div class="loading">Memuat video portofolio...</div></div>
    </main>

    <script>
        // Link Google Sheet Akang
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";
        
        function fixLink(url, isVideo = false) {
            if (!url || url.trim() === "" || url.trim() === "-") return null;
            let link = url.trim();
            // YouTube Handler
            if (isVideo && (link.includes("youtube.com") || link.includes("youtu.be"))) {
                let videoId = link.includes("v=") ? link.split("v=")[1].split("&")[0] : link.split("/").pop().split("?")[0];
                return `https://www.youtube.com/embed/${videoId}`;
            }
            // Dropbox Handler
            if (link.includes("dropbox.com")) return link.replace("www.dropbox.com", "dl.dropboxusercontent.com").replace(/\?dl=[01]/, "?raw=1").replace("&dl=0", "&raw=1");
            return link;
        }

        async function loadVideos() {
            const grid = document.getElementById("videoGrid");
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                
                let videoData = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                    
                    // PEMETAAN DATA:
                    // Judul Video diambil dari Kolom N (Index 13)
                    // Link Video diambil dari Kolom O (Index 14)
                    let videoTitle = cols[13] || "Untitled Project";
                    let videoLink = fixLink(cols[14], true);

                    return { title: videoTitle, video: videoLink };
                }).filter(v => v.video);

                // Urutkan A-Z berdasarkan Judul Video
                videoData.sort((a, b) => a.title.localeCompare(b.title));

                grid.innerHTML = "";
                if (videoData.length === 0) {
                    grid.innerHTML = "<div class='loading'>Belum ada video portofolio yang tersedia.</div>";
                    return;
                }

                videoData.forEach(v => {
                    const div = document.createElement("div");
                    div.className = "video-card";
                    
                    let playerHTML = v.video.includes("youtube.com/embed") 
                        ? `<iframe src="${v.video}" allowfullscreen></iframe>`
                        : `<video controls preload="none"><source src="${v.video}"></video>`;

                    div.innerHTML = `
                        <div class="video-wrapper">${playerHTML}</div>
                        <div class="card-info">
                            <h3>${v.title}</h3>
                        </div>
                    `;
                    grid.appendChild(div);
                });
            } catch (e) { 
                grid.innerHTML = "<div class='loading'>Gagal memuat video.</div>"; 
            }
        }

        loadVideos();
    </script>
</body>
</html>
