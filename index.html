<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV Voice Studio | Talent Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card-bg: #161b2a; --primary: #38bdf8; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        
        /* Navbar dengan Logo */
        .navbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 8%; 
            background: rgba(11, 15, 26, 0.9); 
            backdrop-filter: blur(10px); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .logo img { 
            height: 60px; /* Ukuran logo di navbar */
            width: auto;
            display: block;
        }
        .wa-nav { background: var(--primary); color: #000; padding: 10px 24px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }

        /* Hero Section */
        .hero { padding: 80px 20px 40px; text-align: center; background: radial-gradient(circle at top, #1e293b 0%, #0b0f1a 70%); }
        .hero h1 { font-size: 3rem; margin: 0; letter-spacing: -2px; }
        .highlight { color: var(--primary); text-shadow: 0 0 30px rgba(56, 189, 248, 0.3); }
        .hero p { color: var(--text-dim); margin-top: 15px; font-size: 1.1rem; }

        /* Container & Tabs */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 100px; }
        .filter-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 50px; }
        #searchInput { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 14px 20px; border-radius: 16px; color: white; width: 100%; max-width: 400px; outline: none; }
        .tabs { display: flex; background: var(--card-bg); padding: 6px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-weight: 600; padding: 10px 24px; border-radius: 10px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; }

        /* Card Style */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; overflow: hidden; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .talent-image { width: 100%; height: 280px; object-fit: cover; border-radius: 18px; margin-bottom: 15px; background: #0f172a; display: block; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .card h3 { margin: 0; font-size: 1.3rem; font-weight: 800; color: #fff; }
        .tag { font-size: 0.65rem; background: rgba(56, 189, 248, 0.1); color: var(--primary); padding: 4px 12px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        
        /* Audio Player */
        .samples-container { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .sample-box { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; }
        .sample-label { font-size: 9px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        audio { width: 100%; height: 30px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        
        .loading { grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-dim); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <!-- Menampilkan File Logo Akang -->
            <img src="logo.png" alt="KV Voice Logo">
        </div>
        <a href="https://wa.me/6287823430778" class="wa-nav">Hubungi Kami</a>
    </nav>

    <header class="hero">
        <h1>Voice Over <span class="highlight">Professional</span></h1>
        <!-- Slogan disesuaikan dengan Logo -->
        <p>Your Comprehensive Voice Solution Partner</p>
    </header>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Cari nama talent...">
            <div class="tabs">
                <button onclick="setFilter('all')" class="tab-btn active">Semua</button>
                <button onclick="setFilter('Male')" class="tab-btn">Male</button>
                <button onclick="setFilter('Female')" class="tab-btn">Female</button>
            </div>
        </div>
        <div id="talentGrid" class="grid"><div class="loading">Memuat database talent...</div></div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";
        let talents = [];
        let currentFilter = "all";

        function fixLink(url) {
            if (!url || url.trim() === "" || url.trim() === "-") return null;
            let link = url.trim();
            if (link.includes("dropbox.com")) {
                return link.replace("www.dropbox.com", "dl.dropboxusercontent.com").replace(/\?dl=[01]/, "?raw=1").replace("&dl=0", "&raw=1") + (link.includes("?") ? "" : "?raw=1");
            }
            if (link.includes("drive.google.com")) {
                const match = link.match(/[?&]id=([^&]+)/) || link.match(/\/d\/(.*?)\//) || link.match(/\/file\/d\/(.*?)$/);
                if (match) return `https://docs.google.com/uc?export=view&id=${match[1].split(/[?&/]/)[0]}`;
            }
            return link;
        }

        window.setFilter = function(g) {
            currentFilter = g;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('onclick').includes(`'${g}'`));
            });
            render();
        }

        function render() {
            const grid = document.getElementById("talentGrid");
            const search = document.getElementById("searchInput").value.toLowerCase();
            grid.innerHTML = "";
            const filtered = talents.filter(t => (currentFilter === "all" || t.gender === currentFilter) && t.name.toLowerCase().includes(search));
            
            if (filtered.length === 0) {
                grid.innerHTML = "<div class='loading'>Talent tidak ditemukan.</div>";
                return;
            }

            filtered.forEach(t => {
                const div = document.createElement("div");
                div.className = "card";
                let audioHTML = t.samples.map((link, i) => `
                    <div class="sample-box">
                        <label class="sample-label">Sample ${i+1}</label>
                        <audio controls preload="none"><source src="${link}"></audio>
                    </div>
                `).join("");

                const imageSrc = t.photo || "https://via.placeholder.com/400x500/161b2a/38bdf8?text=KV+Voice+Talent";

                div.innerHTML = `
                    <img src="${imageSrc}" class="talent-image" alt="${t.name}" onerror="this.src='https://via.placeholder.com/400x500/161b2a/38bdf8?text=Image+Error'">
                    <div class="card-info">
                        <div class="card-header">
                            <h3>${t.name}</h3>
                            <span class="tag">${t.gender}</span>
                        </div>
                        <p style="color:#94a3b8; font-size:12px; margin: 0 0 15px 0;">${t.displayGender}</p>
                        <div class="samples-container">
                            ${audioHTML}
                        </div>
                    </div>
                `;
                grid.appendChild(div);
            });

            const players = document.querySelectorAll("audio");
            players.forEach(p => p.addEventListener("play", () => {
                players.forEach(other => { if(other !== p) other.pause(); });
            }));
        }

        async function loadData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                talents = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                    let samples = [];
                    for (let i = 4; i <= 10; i++) { 
                        let a = fixLink(cols[i]); 
                        if (a) samples.push(a); 
                    }
                    let photo = fixLink(cols[11]);
                    let cat = (cols[3] || "").toLowerCase();
                    let g = cat.includes("female") ? "Female" : (cat.includes("male") ? "Male" : "Other");
                    return { name: cols[2], gender: g, displayGender: cols[3], samples: samples, photo: photo };
                }).filter(t => t.samples.length > 0);
                render();
            } catch (e) { 
                document.getElementById("talentGrid").innerHTML = "<div class='loading'>Gagal memuat database.</div>"; 
            }
        }
        document.getElementById("searchInput").addEventListener("input", render);
        loadData();
    </script>
</body>
</html>
