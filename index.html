<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Talent | KV Voice Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card-bg: #161b2a; --primary: #38bdf8; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; background: rgba(11, 15, 26, 0.95); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-weight: 800; font-size: 1.2rem; color: #fff; text-decoration: none; }
        .nav-links a { text-decoration: none; color: var(--text-dim); margin-left: 20px; font-weight: 600; font-size: 0.85rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .filter-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
        #searchInput { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 12px; color: white; width: 100%; max-width: 300px; outline: none; }
        .tabs { display: flex; background: var(--card-bg); padding: 5px; border-radius: 12px; }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-weight: 600; padding: 8px 18px; border-radius: 8px; font-size: 0.85rem; }
        .tab-btn.active { background: var(--primary); color: #000; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 16px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; transition: 0.3s; }
        .img-container { width: 100%; aspect-ratio: 3/4; background: #1e293b; border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-info h3 { margin: 0; font-size: 1.1rem; font-weight: 800; }
        .tag { font-size: 0.65rem; color: var(--primary); font-weight: 800; text-transform: uppercase; background: rgba(56, 189, 248, 0.1); padding: 2px 8px; border-radius: 5px; }

        /* Menghilangkan jarak jika samples kosong */
        .samples { display: flex; flex-direction: column; gap: 6px; }
        .samples:empty { display: none; margin: 0; }
        .sample-box { background: rgba(255,255,255,0.03); padding: 6px 10px; border-radius: 10px; margin-top: 6px; }
        .sample-label { font-size: 7px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; display: block; }
        audio { width: 100%; height: 24px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 50px; }
        .page-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 8px 16px; border-radius: 10px; cursor: pointer; }
        .page-btn.active { background: var(--primary); color: #000; }

        footer { text-align: center; padding: 60px 20px; border-top: 1px solid rgba(255,255,255,0.05); color: var(--text-dim); font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">KV VOICE STUDIO</a>
        <div class="nav-links">
            <a href="index.html" class="active">Audio Catalog</a>
            <a href="video.html">Video Showcase</a>
            <a href="https://wa.me/6287823430778" style="color:var(--primary)">Contact</a>
        </div>
    </nav>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Cari nama talent...">
            <div class="tabs">
                <button onclick="changeFilter('all')" class="tab-btn active" id="btn-all">All</button>
                <button onclick="changeFilter('Male')" class="tab-btn" id="btn-Male">Male</button>
                <button onclick="changeFilter('Female')" class="tab-btn" id="btn-Female">Female</button>
            </div>
        </div>
        <div id="talentGrid" class="grid"></div>
        <div id="pagination" class="pagination"></div>
    </main>

    <footer>Setiap project didukung oleh tim Lokalisasi, Subtitling, dan Transkreasi kami.</footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";
        let allTalents = [];
        let filteredTalents = [];
        let currentPage = 1;
        const itemsPerPage = 8;
        let currentFilter = 'all';

        function fixLink(url) {
            if (!url || url.trim() === "" || url.trim() === "-") return null;
            let link = url.trim();
            if (link.includes("dropbox.com")) return link.replace("www.dropbox.com", "dl.dropboxusercontent.com").replace(/\?dl=[01]/, "?raw=1");
            if (link.includes("drive.google.com")) {
                const match = link.match(/[?&]id=([^&]+)/) || link.match(/\/d\/(.*?)\//);
                if (match) return `https://docs.google.com/uc?export=view&id=${match[1].split(/[?&/]/)[0]}`;
            }
            return link;
        }

        async function loadData() {
            const res = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
            const text = await res.text();
            const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
            allTalents = rows.slice(1).map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                let samples = [];
                for (let i = 3; i <= 9; i++) { 
                    let s = fixLink(cols[i]); 
                    if (s) samples.push(s); 
                }
                return { name: (cols[12]||"").split(' ')[0], category: cols[2]||"", photo: fixLink(cols[11]), samples };
            });
            applyFilter();
        }

        function applyFilter() {
            const s = document.getElementById("searchInput").value.toLowerCase();
            filteredTalents = allTalents.filter(t => (currentFilter === 'all' || t.category.includes(currentFilter)) && t.name.toLowerCase().includes(s));
            render();
        }

        function render() {
            const grid = document.getElementById("talentGrid");
            grid.innerHTML = filteredTalents.slice((currentPage-1)*itemsPerPage, currentPage*itemsPerPage).map(t => `
                <div class="card">
                    <div class="img-container">
                        ${t.photo ? `<img src="${t.photo}">` : `<div style="height:100%; display:flex; align-items:center; justify-content:center; color:#444">NO PHOTO</div>`}
                    </div>
                    <div class="card-info" style="margin-bottom: ${t.samples.length > 0 ? '10px' : '0'}">
                        <h3>${t.name}</h3>
                        <span class="tag">${t.category}</span>
                    </div>
                    <div class="samples">
                        ${t.samples.map((s,i) => `<div class="sample-box"><label class="sample-label">Sample ${i+1}</label><audio controls preload="none"><source src="${s}"></audio></div>`).join('')}
                    </div>
                </div>
            `).join('');
            renderPagination();
        }

        function renderPagination() {
            const container = document.getElementById("pagination");
            const total = Math.ceil(filteredTalents.length / itemsPerPage);
            container.innerHTML = Array.from({length: total}, (_, i) => `<button class="page-btn ${i+1===currentPage?'active':''}" onclick="currentPage=${i+1};render();window.scrollTo({top:300,behavior:'smooth'})">${i+1}</button>`).join('');
        }

        function changeFilter(c) {
            currentFilter = c;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+c));
            currentPage = 1; applyFilter();
        }

        document.getElementById("searchInput").addEventListener("input", applyFilter);
        loadData();
    </script>
</body>
</html>
