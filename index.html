<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV Voice Studio | Talent Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* CSS LANGSUNG DI SINI AGAR TIDAK ERROR */
        :root { --bg: #0b0f1a; --card-bg: #161b2a; --primary: #38bdf8; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(11, 15, 26, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--primary); }
        .wa-nav { background: var(--primary); color: #000; padding: 10px 24px; border-radius: 12px; text-decoration: none; font-weight: 700; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        .hero { padding: 100px 20px 60px; text-align: center; background: radial-gradient(circle at top, #1e293b 0%, #0b0f1a 70%); }
        .highlight { color: var(--primary); text-shadow: 0 0 30px rgba(56, 189, 248, 0.3); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 100px; }
        .filter-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 50px; }
        #searchInput { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 14px 20px; border-radius: 16px; color: white; width: 100%; max-width: 400px; outline: none; }
        .tabs { display: flex; background: var(--card-bg); padding: 6px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-weight: 600; padding: 10px 24px; border-radius: 10px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .tag { font-size: 0.65rem; background: rgba(56, 189, 248, 0.1); color: var(--primary); padding: 4px 12px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        .samples-container { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        audio { width: 100%; height: 35px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        .loading { grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-dim); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">KV <span>VOICE</span></div>
        <a href="https://wa.me/6287823430778" class="wa-nav">Hubungi Kami</a>
    </nav>

    <header class="hero">
        <h1>Voice Over <span class="highlight">Professional</span></h1>
        <p>Katalog Talent KV Voice Studio</p>
    </header>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Cari nama talent...">
            <div class="tabs">
                <button onclick="setFilter('all')" class="tab-btn active">Semua</button>
                <button onclick="setFilter('Male')" class="tab-btn">Male</button>
                <button onclick="setFilter('Female')" class="tab-btn">Female</button>
            </div>
        </div>
        <div id="talentGrid" class="grid"><div class="loading">Memuat database talent...</div></div>
    </main>

    <script>
        // JAVASCRIPT LANGSUNG DI SINI AGAR TIDAK ADA ERROR 'NOT DEFINED'
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";
        let talents = [];
        let currentFilter = "all";

        function fixLink(url) {
            if (!url || url.trim() === "" || url.trim() === "-") return null;
            let link = url.trim();
            if (link.includes("dropbox.com")) {
                return link.replace("www.dropbox.com", "dl.dropboxusercontent.com").replace(/\?dl=[01]/, "?raw=1").replace("&dl=0", "&raw=1") + (link.includes("?") ? "" : "?raw=1");
            }
            if (link.includes("drive.google.com")) {
                const match = link.match(/[?&]id=([^&]+)/) || link.match(/\/d\/(.*?)\//) || link.match(/\/file\/d\/(.*?)$/);
                if (match) return `https://docs.google.com/uc?export=open&id=${match[1].split(/[?&/]/)[0]}`;
            }
            return link;
        }

        window.setFilter = function(g) {
            currentFilter = g;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('onclick').includes(`'${g}'`));
            });
            render();
        }

        function render() {
            const grid = document.getElementById("talentGrid");
            const search = document.getElementById("searchInput").value.toLowerCase();
            grid.innerHTML = "";
            const filtered = talents.filter(t => (currentFilter === "all" || t.gender === currentFilter) && t.name.toLowerCase().includes(search));
            if (filtered.length === 0) { grid.innerHTML = "<div class='loading'>Tidak ada data.</div>"; return; }
            filtered.forEach(t => {
                const div = document.createElement("div");
                div.className = "card";
                let audioHTML = t.samples.map((link, i) => `<div style="margin-bottom:10px"><label style="font-size:10px; color:#38bdf8">SAMPLE ${i+1}</label><audio controls preload="none"><source src="${link}"></audio></div>`).join("");
                div.innerHTML = `<div style="display:flex; justify-content:space-between"><h3>${t.name}</h3><span class="tag">${t.gender}</span></div><p style="color:#94a3b8; font-size:12px">${t.displayGender}</p><div class="samples-container">${audioHTML}</div>`;
                grid.appendChild(div);
            });
        }

        async function loadData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                talents = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                    let samples = [];
                    for (let i = 4; i <= 10; i++) { let a = fixLink(cols[i]); if (a) samples.push(a); }
                    let cat = (cols[3] || "").toLowerCase();
                    let g = cat.includes("female") ? "Female" : (cat.includes("male") ? "Male" : "Other");
                    return { name: cols[2], gender: g, displayGender: cols[3], samples: samples };
                }).filter(t => t.samples.length > 0);
                render();
            } catch (e) { document.getElementById("talentGrid").innerHTML = "Gagal memuat data."; }
        }

        document.getElementById("searchInput").addEventListener("input", render);
        loadData();
    </script>
</body>
</html>
