<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Talent | KV Voice Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card-bg: #161b2a; --primary: #38bdf8; --text: #f8fafc; --text-dim: #94a3b8; }
        
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; background: rgba(11, 15, 26, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 800; font-size: 1.2rem; color: #fff; text-decoration: none; letter-spacing: -0.5px; }
        .logo span { color: var(--primary); }
        .nav-links a { text-decoration: none; color: var(--text-dim); margin-left: 20px; font-weight: 600; font-size: 0.85rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        /* Hero */
        .hero { padding: 60px 20px 20px; text-align: center; background: radial-gradient(circle at top, #1e293b 0%, #0b0f1a 70%); }
        .hero h1 { font-size: 2.5rem; margin: 0; letter-spacing: -2px; }
        .highlight { color: var(--primary); text-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }

        /* Container */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; }
        
        .filter-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; margin-top: 20px; }
        #searchInput { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 12px; color: white; width: 100%; max-width: 300px; outline: none; transition: 0.3s; }
        #searchInput:focus { border-color: var(--primary); }

        .tabs { display: flex; background: var(--card-bg); padding: 5px; border-radius: 12px; }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-weight: 600; padding: 8px 20px; border-radius: 8px; font-size: 0.85rem; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; min-height: 400px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .img-wrapper { width: 100%; aspect-ratio: 3/4; background: #0f172a; border-radius: 15px; margin-bottom: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .img-placeholder { color: var(--text-dim); font-size: 0.7rem; font-weight: 800; opacity: 0.5; }

        .card h3 { margin: 0; font-size: 1.1rem; font-weight: 800; }
        .tag { font-size: 0.65rem; background: rgba(56, 189, 248, 0.1); color: var(--primary); padding: 3px 10px; border-radius: 6px; font-weight: 800; text-transform: uppercase; margin-top: 5px; display: inline-block; }

        /* Audio Player - Menghilangkan Jarak Jika Kosong */
        .samples-list { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .samples-list:empty { display: none; margin: 0; }
        .audio-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; }
        .audio-box label { font-size: 8px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 3px; }
        audio { width: 100%; height: 25px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 50px; }
        .page-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .page-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        footer { text-align: center; padding: 50px 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 50px; color: var(--text-dim); font-size: 0.8rem; }
        .loading { grid-column: 1/-1; text-align: center; padding: 100px; color: var(--primary); font-weight: 800; letter-spacing: 2px; }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .filter-bar { justify-content: center; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">KV <span>VOICE STUDIO</span></a>
        <div class="nav-links">
            <a href="index.html" class="active">Audio Catalog</a>
            <a href="video.html">Video Showcase</a>
            <a href="https://wa.me/6287823430778" style="color:var(--primary)">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Talent <span class="highlight">Directory</span></h1>
    </header>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Cari nama talent...">
            <div class="tabs">
                <button onclick="changeFilter('all')" class="tab-btn active" id="btn-all">All</button>
                <button onclick="changeFilter('Male')" class="tab-btn" id="btn-Male">Male</button>
                <button onclick="changeFilter('Female')" class="tab-btn" id="btn-Female">Female</button>
                <button onclick="changeFilter('Kid')" class="tab-btn" id="btn-Kid">Kid</button>
            </div>
        </div>
        <div id="talentGrid" class="grid"><div class="loading">SINKRONISASI DATABASE...</div></div>
        <div id="pagination" class="pagination"></div>
    </main>

    <footer>
        Setiap project didukung oleh tim Lokalisasi, Subtitling, dan Transkreasi kami.<br>
        &copy; 2024 KV Voice Studio
    </footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";
        
        let allTalents = [];
        let filteredTalents = [];
        let currentPage = 1;
        const itemsPerPage = 8;
        let currentFilter = 'all';

        function fixLink(url) {
            if (!url || url.trim() === "" || url.trim() === "-") return null;
            let link = url.trim();
            // Dropbox Direct Fix
            if (link.includes("dropbox.com")) {
                return link.replace("www.dropbox.com", "dl.dropboxusercontent.com").replace(/\?dl=[01]/, "").split('?')[0] + "?raw=1";
            }
            // Drive Direct Fix
            if (link.includes("drive.google.com")) {
                const match = link.match(/[?&]id=([^&]+)/) || link.match(/\/d\/(.*?)\//);
                if (match) return `https://docs.google.com/uc?export=view&id=${match[1].split(/[?&/]/)[0]}`;
            }
            return link;
        }

        async function loadData() {
            try {
                const res = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
                const text = await res.text();
                // Robust CSV Split
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                
                allTalents = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                    let samples = [];
                    for (let i = 3; i <= 9; i++) { // Kolom D-J
                        let s = fixLink(cols[i]);
                        if (s) samples.push(s);
                    }
                    return {
                        name: (cols[12] || "Talent").split(' ')[0], // Kolom M
                        category: cols[2] || "Other",              // Kolom C
                        photo: fixLink(cols[11]),                 // Kolom L
                        samples: samples
                    };
                }).filter(t => t.name !== "Talent");

                applyFilter();
            } catch (e) {
                document.getElementById("talentGrid").innerHTML = "Gagal memuat database.";
            }
        }

        function applyFilter() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            filteredTalents = allTalents.filter(t => {
                const matchCat = currentFilter === 'all' || t.category.toLowerCase().includes(currentFilter.toLowerCase());
                const matchSearch = t.name.toLowerCase().includes(search);
                return matchCat && matchSearch;
            });
            currentPage = 1;
            render();
        }

        function render() {
            const grid = document.getElementById("talentGrid");
            grid.innerHTML = "";
            const items = filteredTalents.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

            items.forEach(t => {
                const card = document.createElement("div");
                card.className = "card";
                
                const photoHTML = t.photo 
                    ? `<img src="${t.photo}" loading="lazy">` 
                    : `<div class="img-placeholder">PHOTO NOT AVAILABLE</div>`;

                const audioHTML = t.samples.map((s, i) => `
                    <div class="audio-box">
                        <label>Sample ${i+1}</label>
                        <audio controls preload="none"><source src="${s}"></audio>
                    </div>
                `).join('');

                card.innerHTML = `
                    <div class="img-wrapper">${photoHTML}</div>
                    <div class="card-info">
                        <h3>${t.name}</h3>
                        <span class="tag">${t.category}</span>
                    </div>
                    <div class="samples-list">${audioHTML}</div>
                `;
                grid.appendChild(card);
            });

            const total = Math.ceil(filteredTalents.length / itemsPerPage);
            const pagin = document.getElementById("pagination");
            pagin.innerHTML = Array.from({length: total}, (_, i) => `
                <button class="page-btn ${i+1 === currentPage ? 'active' : ''}" 
                onclick="currentPage=${i+1};render();window.scrollTo({top:300,behavior:'smooth'})">${i+1}</button>
            `).join('');

            // Auto Pause Audio
            const players = document.querySelectorAll("audio");
            players.forEach(p => p.addEventListener("play", () => {
                players.forEach(o => { if(o !== p) o.pause(); });
            }));
        }

        function changeFilter(c) {
            currentFilter = c;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+c));
            applyFilter();
        }

        document.getElementById("searchInput").addEventListener("input", applyFilter);
        loadData();
    </script>
</body>
</html>
