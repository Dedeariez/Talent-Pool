<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Talent | KV Voice Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card-bg: #161b2a; --primary: #38bdf8; --text: #f8fafc; --text-dim: #94a3b8; }
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; background: rgba(11, 15, 26, 0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-weight: 800; font-size: 1.2rem; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary); }
        .nav-links a { text-decoration: none; color: var(--text-dim); margin-left: 20px; font-weight: 600; font-size: 0.85rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        /* Container */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px 80px; }
        .filter-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; }
        #searchInput { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 12px; color: white; width: 100%; max-width: 300px; outline: none; }
        #searchInput:focus { border-color: var(--primary); }

        .tabs { display: flex; background: var(--card-bg); padding: 5px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-weight: 600; padding: 8px 18px; border-radius: 8px; font-size: 0.85rem; }
        .tab-btn.active { background: var(--primary); color: #000; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; min-height: 400px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 16px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; transition: 0.3s; height: 100%; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        /* Foto Box */
        .img-wrapper { width: 100%; aspect-ratio: 3/4; background: #0f172a; border-radius: 14px; margin-bottom: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .card h3 { margin: 0; font-size: 1.15rem; font-weight: 800; color: #fff; }
        .tag { font-size: 0.65rem; background: rgba(56, 189, 248, 0.1); color: var(--primary); padding: 3px 10px; border-radius: 6px; font-weight: 800; text-transform: uppercase; margin-top: 5px; display: inline-block; }

        /* Audio Player Cleaner */
        .samples { display: flex; flex-direction: column; gap: 6px; margin-top: 15px; }
        .samples:empty { display: none; margin: 0; }
        .audio-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; }
        .audio-box label { font-size: 7px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 3px; }
        audio { width: 100%; height: 25px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 50px; }
        .page-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .page-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        footer { text-align: center; padding: 60px 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 50px; color: var(--text-dim); font-size: 0.8rem; }
        .loading { grid-column: 1/-1; text-align: center; padding: 100px; color: var(--primary); font-weight: 800; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">KV <span>VOICE STUDIO</span></a>
        <div class="nav-links">
            <a href="index.html" class="active">Audio Catalog</a>
            <a href="video.html">Video Portfolio</a>
            <a href="https://wa.me/6287823430778" style="color:var(--primary)">Contact</a>
        </div>
    </nav>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Cari nama talent...">
            <div class="tabs">
                <button onclick="changeFilter('all')" class="tab-btn active" id="btn-all">All</button>
                <button onclick="changeFilter('Male')" class="tab-btn" id="btn-Male">Male</button>
                <button onclick="changeFilter('Female')" class="tab-btn" id="btn-Female">Female</button>
                <button onclick="changeFilter('Kid')" class="tab-btn" id="btn-Kid">Kid</button>
            </div>
        </div>
        <div id="talentGrid" class="grid"><div class="loading">SINKRONISASI DATA...</div></div>
        <div id="pagination" class="pagination"></div>
    </main>

    <footer>Setiap project didukung oleh tim Lokalisasi, Subtitling, dan Transkreasi kami.</footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";
        
        let allTalents = [];
        let filteredTalents = [];
        let currentPage = 1;
        const itemsPerPage = 8;
        let currentFilter = 'all';

        function fixDropbox(url) {
            if (!url || url.trim() === "" || url.trim() === "-" || url.includes("drive.google.com")) return null;
            let link = url.trim();
            if (link.includes("dropbox.com")) {
                return link.replace("www.dropbox.com", "dl.dropboxusercontent.com").replace(/dl=[0-9]+/, "raw=1");
            }
            return null;
        }

        async function loadData() {
            try {
                const res = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                
                allTalents = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                    
                    let samples = [];
                    // Indeks 3-7 adalah Kolom D-H (Sample 1-5)
                    for (let i = 3; i <= 7; i++) { 
                        let s = fixDropbox(cols[i]);
                        if (s) samples.push(s);
                    }

                    return {
                        name: (cols[12] || "Talent").trim().split(' ')[0], // Indeks 12 Nama
                        category: cols[2] || "Other",                     // Indeks 2 Kategori
                        photo: fixDropbox(cols[11]),                      // Indeks 11 Foto
                        samples: samples
                    };
                }).filter(t => t.samples.length > 0);

                applyFilter();
            } catch (e) {
                document.getElementById("talentGrid").innerHTML = "<div class='loading'>Gagal Sinkronisasi</div>";
            }
        }

        function applyFilter() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            filteredTalents = allTalents.filter(t => {
                const matchCat = currentFilter === 'all' || t.category.toLowerCase().includes(currentFilter.toLowerCase());
                const matchSearch = t.name.toLowerCase().includes(search);
                return matchCat && matchSearch;
            });
            currentPage = 1;
            render();
        }

        function render() {
            const grid = document.getElementById("talentGrid");
            grid.innerHTML = "";
            const items = filteredTalents.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

            items.forEach(t => {
                const div = document.createElement("div");
                div.className = "card";
                
                const photoHTML = t.photo 
                    ? `<img src="${t.photo}" loading="lazy" referrerpolicy="no-referrer">` 
                    : `<div style="font-size:10px;opacity:0.3">NO PHOTO</div>`;

                const audioHTML = t.samples.map((s, i) => `
                    <div class="audio-box">
                        <label>Sample ${i+1}</label>
                        <audio controls preload="none"><source src="${s}"></audio>
                    </div>
                `).join('');

                div.innerHTML = `
                    <div class="img-wrapper">${photoHTML}</div>
                    <div style="margin-bottom: ${t.samples.length > 0 ? '5px' : '0'}">
                        <h3>${t.name}</h3>
                        <span class="tag">${t.category}</span>
                    </div>
                    <div class="samples">${audioHTML}</div>
                `;
                grid.appendChild(card);
            });

            const total = Math.ceil(filteredTalents.length / itemsPerPage);
            document.getElementById("pagination").innerHTML = Array.from({length: total}, (_, i) => `
                <button class="page-btn ${i+1===currentPage?'active':''}" 
                onclick="currentPage=${i+1};render();window.scrollTo({top:300,behavior:'smooth'})">${i+1}</button>
            `).join('');

            const audios = document.querySelectorAll("audio");
            audios.forEach(a => a.addEventListener("play", () => {
                audios.forEach(o => { if(o !== a) o.pause(); });
            }));
        }

        function changeFilter(c) {
            currentFilter = c;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+c));
            applyFilter();
        }

        document.getElementById("searchInput").addEventListener("input", applyFilter);
        loadData();
    </script>
</body>
</html>
