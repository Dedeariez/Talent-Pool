<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Talent | KV Voice Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card-bg: #161b2a; --primary: #38bdf8; --text: #f8fafc; --text-dim: #94a3b8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; background: rgba(11, 15, 26, 0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 800; font-size: 1.2rem; color: #fff; text-decoration: none; }
        .nav-links a { text-decoration: none; color: var(--text-dim); margin-left: 20px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        /* Hero */
        .hero { padding: 60px 20px 40px; text-align: center; background: radial-gradient(circle at top, #1e293b 0%, #0b0f1a 70%); }
        .hero h1 { font-size: 2.5rem; margin: 0; letter-spacing: -1px; }
        .highlight { color: var(--primary); }

        /* Main Container */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 50px; }
        .filter-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; }
        #searchInput { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 12px; color: white; width: 100%; max-width: 300px; outline: none; }
        .tabs { display: flex; background: var(--card-bg); padding: 5px; border-radius: 12px; }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-weight: 600; padding: 8px 18px; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; }

        /* Talent Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; min-height: 400px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .talent-img { width: 100%; height: 280px; object-fit: cover; border-radius: 15px; margin-bottom: 12px; background: #0f172a; }
        
        .samples { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .sample-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; }
        .sample-label { font-size: 8px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 3px; display: block; }
        audio { width: 100%; height: 28px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 50px; }
        .page-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .page-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }
        .page-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

        footer { text-align: center; padding: 50px 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 50px; color: var(--text-dim); font-size: 0.85rem; }
        .loading { grid-column: 1/-1; text-align: center; padding: 100px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">KV VOICE STUDIO</a>
        <div class="nav-links">
            <a href="index.html" class="active">Audio Catalog</a>
            <a href="video.html">Video Showcase</a>
            <a href="https://wa.me/6287823430778" style="color: var(--primary)">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Audio <span class="highlight">Directory</span></h1>
        <p style="color: var(--text-dim)">Professional voice talents for your global project</p>
    </header>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Cari nama talent...">
            <div class="tabs">
                <button onclick="changeFilter('all')" class="tab-btn active" id="btn-all">All</button>
                <button onclick="changeFilter('Male')" class="tab-btn" id="btn-Male">Male</button>
                <button onclick="changeFilter('Female')" class="tab-btn" id="btn-Female">Female</button>
                <button onclick="changeFilter('Kid')" class="tab-btn" id="btn-Kid">Kid</button>
            </div>
        </div>

        <div id="talentGrid" class="grid"><div class="loading">Memuat database...</div></div>
        <div id="pagination" class="pagination"></div>
    </main>

    <footer>
        Setiap project didukung oleh tim Lokalisasi, Subtitling, dan Transkreasi kami.
        <br><br>&copy; 2024 KV Voice Studio
    </footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTg3rjqHoD36dUM0PU33sGqYnovngVpCfBS6A2EYngYMeU8vuvXLRRuD_Dd8utXGckTMKQB_IKtqW5H/pub?output=csv";
        
        let allTalents = [];
        let filteredTalents = [];
        let currentPage = 1;
        const itemsPerPage = 8; // BATAS 8 TALENT PER HALAMAN
        let currentFilter = 'all';

        function fixLink(url) {
            if (!url || url.trim() === "" || url.trim() === "-") return null;
            let link = url.trim();
            if (link.includes("drive.google.com")) {
                const match = link.match(/[?&]id=([^&]+)/) || link.match(/\/d\/(.*?)\//) || link.match(/\/file\/d\/(.*?)$/);
                if (match) return `https://docs.google.com/uc?export=view&id=${match[1].split(/[?&/]/)[0]}`;
            }
            return link;
        }

        async function loadData() {
            try {
                const res = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim() !== "");
                
                allTalents = rows.slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, "").trim());
                    let samples = [];
                    for (let i = 3; i <= 9; i++) { 
                        let s = fixLink(cols[i]); 
                        if (s) samples.push(s); 
                    }
                    return {
                        name: (cols[12] || "Talent").split(' ')[0],
                        category: cols[2] || "Other",
                        photo: fixLink(cols[11]),
                        samples: samples
                    };
                }).filter(t => t.name !== "Talent" && t.samples.length > 0);

                applyFilterAndRender();
            } catch (e) {
                document.getElementById("talentGrid").innerHTML = "Error loading data.";
            }
        }

        function applyFilterAndRender() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            filteredTalents = allTalents.filter(t => 
                (currentFilter === 'all' || t.category.toLowerCase().includes(currentFilter.toLowerCase())) &&
                (t.name.toLowerCase().includes(search))
            );
            currentPage = 1;
            renderPage();
        }

        function renderPage() {
            const grid = document.getElementById("talentGrid");
            grid.innerHTML = "";
            
            const start = (currentPage - 1) * itemsPerPage;
            const paginatedItems = filteredTalents.slice(start, start + itemsPerPage);

            paginatedItems.forEach(t => {
                const div = document.createElement("div");
                div.className = "card";
                let audioHTML = t.samples.map((s, i) => `
                    <div class="sample-box">
                        <label class="sample-label">Sample ${i+1}</label>
                        <audio controls preload="none"><source src="${s}"></audio>
                    </div>
                `).join('');

                div.innerHTML = `
                    <img src="${t.photo || 'https://via.placeholder.com/300x400'}" class="talent-img" alt="KV">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <h3 style="margin:0">${t.name}</h3>
                        <span style="font-size:10px; color:var(--primary); font-weight:800; text-transform:uppercase">${t.category}</span>
                    </div>
                    <div class="samples">${audioHTML}</div>
                `;
                grid.appendChild(div);
            });

            renderPaginationControls();
            
            // Auto-pause audio lain
            const players = document.querySelectorAll("audio");
            players.forEach(p => p.addEventListener("play", () => {
                players.forEach(other => { if(other !== p) other.pause(); });
            }));
        }

        function renderPaginationControls() {
            const paginationDiv = document.getElementById("pagination");
            const totalPages = Math.ceil(filteredTalents.length / itemsPerPage);
            paginationDiv.innerHTML = "";
            
            if (totalPages <= 1) return;

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement("button");
                btn.innerText = i;
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.onclick = () => {
                    currentPage = i;
                    renderPage();
                    window.scrollTo({ top: 400, behavior: 'smooth' });
                };
                paginationDiv.appendChild(btn);
            }
        }

        function changeFilter(c) {
            currentFilter = c;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-'+c));
            applyFilterAndRender();
        }

        document.getElementById("searchInput").addEventListener("input", applyFilterAndRender);
        loadData();
    </script>
</body>
</html>
